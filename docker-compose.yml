services:
  hopper-ops:
    build: .
    container_name: hopper-ops
    restart: unless-stopped
    ports:
      - "127.0.0.1:3616:3616"
    environment:
      - DATABASE_URL=postgresql://hopperops:${DB_PASSWORD}@db:5432/hopper_ops
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=https://your-domain.example.com/auth/google/callback
      - APP_URL=https://your-domain.example.com
      - APP_PORT=3616
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - SESSION_SECRET=${SESSION_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - UPTIMEROBOT_API_KEY=${UPTIMEROBOT_API_KEY}
      - SENTRY_API_TOKEN=${SENTRY_API_TOKEN}
      - SENTRY_ORG=${SENTRY_ORG}
      - SENTRY_DSN=${SENTRY_DSN}
      - MONITOR_LOG_PATH=/opt/app/backups/monitor.log
      - DAILY_REPORT_LOG_PATH=/opt/app/backups/daily-report.log
    volumes:
      - /opt/app/backups:/opt/app/backups:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hopperops.rule=Host(`your-domain.example.com`)"
      - "traefik.http.routers.hopperops.tls=true"
      - "traefik.http.routers.hopperops.tls.certresolver=mytlschallenge"
      - "traefik.http.services.hopperops.loadbalancer.server.port=3616"
